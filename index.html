<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>一触连爆</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --bg1:#f8f3ea; --bg2:#efe5d4; --ink:#5d5346; --soft:#9b8f7c;
    --card:#fffdf8; --shadow:rgba(150,128,96,.16);
    --accent:#cf9277; --accentDk:#b97a5e;   /* 陶土橙 */
    --sage:#9bb072; --sageDk:#85994f;        /* 鼠尾草绿 */
    --gold:#dcab4d;                          /* 燕麦金 */
  }
  html,body{height:100%;overscroll-behavior:none;}
  body{background:linear-gradient(165deg,var(--bg1),var(--bg2));color:var(--ink);
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:14px 12px 22px;min-height:100%;user-select:none;overflow:hidden;touch-action:none;}
  .top{width:100%;max-width:420px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .title{font-size:19px;font-weight:800;letter-spacing:3px;color:var(--ink);}
  .title small{display:block;font-size:9px;color:var(--soft);letter-spacing:2px;margin-top:3px;font-weight:600;}
  .stat{display:flex;gap:8px;}
  .box{background:var(--card);border-radius:14px;padding:6px 13px;text-align:center;min-width:60px;box-shadow:0 3px 10px var(--shadow);}
  .box .l{font-size:9px;color:var(--soft);letter-spacing:1px;}
  .box .v{font-size:17px;font-weight:800;line-height:1.15;color:var(--ink);}
  .order{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border-radius:14px;padding:9px 15px;margin:5px 0 8px;font-size:13px;font-weight:700;color:var(--soft);box-shadow:0 3px 10px var(--shadow);}
  .order b{color:var(--accentDk);} .order .prog b{color:var(--sageDk);}
  .wrap{position:relative;width:min(94vw,420px);flex:1;min-height:380px;
    background:linear-gradient(160deg,#fbf4e6,#f3e7d2);border-radius:24px;overflow:hidden;
    box-shadow:0 8px 24px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.5);transition:background .5s;}
  .bub{position:absolute;border-radius:50%;will-change:left,top,transform;border:1px solid rgba(120,90,60,.07);}
  .bub.pop{animation:pp .3s ease forwards;}
  @keyframes pp{0%{transform:scale(1);}45%{transform:scale(1.55);}100%{transform:scale(0);opacity:0;}}
  .bub.big-ball{animation:bigpulse 1.1s ease-in-out infinite;}
  @keyframes bigpulse{0%,100%{box-shadow:0 0 8px var(--gold);}50%{box-shadow:0 0 18px var(--gold),0 0 28px rgba(220,171,77,.7);}}
  .m-cross{display:block;background:
      linear-gradient(#fff,#fff) center/100% 30% no-repeat,
      linear-gradient(#fff,#fff) center/30% 100% no-repeat;
      filter:drop-shadow(0 1px 1px rgba(120,80,40,.25));}
  .obs{position:absolute;border-radius:30%;background:linear-gradient(160deg,#cdbfa6,#b6a684);
    box-shadow:inset 0 -3px 6px rgba(90,70,40,.3), 0 2px 5px var(--shadow);}
  .ring{position:absolute;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;
    border:2px solid rgba(255,255,255,.95);
    background:radial-gradient(circle,rgba(255,255,255,.22) 0%,rgba(255,255,255,.06) 60%,transparent 72%);
    box-shadow:0 0 22px rgba(207,146,119,.55);}
  .part{position:absolute;border-radius:50%;pointer-events:none;will-change:transform,opacity;transition:transform .5s ease-out,opacity .5s ease-out;}
  .beam{position:absolute;background:rgba(255,255,255,.92);box-shadow:0 0 18px #fff,0 0 34px rgba(207,146,119,.6);pointer-events:none;z-index:4;animation:beamf .42s ease-out forwards;}
  @keyframes beamf{0%{opacity:.95;}100%{opacity:0;}}
  .combo{position:absolute;top:28%;left:0;right:0;text-align:center;pointer-events:none;z-index:18;font-weight:800;color:var(--accentDk);text-shadow:0 2px 10px rgba(255,255,255,.8);opacity:0;}
  .combo.show{opacity:1;}
  .items{width:100%;max-width:420px;display:flex;align-items:center;gap:10px;margin-top:11px;}
  .coins{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:800;color:var(--accentDk);white-space:nowrap;}
  .coin-ico{width:15px;height:15px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fbe6a8,var(--gold));box-shadow:inset 0 0 0 1.5px #c79433;}
  .item{flex:1;background:var(--card);border:2px solid transparent;border-radius:13px;color:var(--ink);font-size:13px;font-weight:700;padding:10px 8px;cursor:pointer;box-shadow:0 3px 10px var(--shadow);}
  .item.armed{border-color:var(--sage);box-shadow:0 0 10px rgba(155,176,114,.55);}
  .item.poor{opacity:.5;}
  .controls{margin-top:11px;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;max-width:420px;}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:16px;padding:12px 22px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 var(--accentDk);transition:transform .06s,box-shadow .06s;}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accentDk);}
  .btn.ghost{background:#f3ead9;color:var(--accentDk);box-shadow:0 4px 0 #e0d2bb;}
  .btn.ghost:active{box-shadow:0 1px 0 #e0d2bb;}
  .btn:disabled{opacity:.4;box-shadow:none;}
  .start .btn,.overlay .btn{width:min(76%,240px);}
  .tg{background:#f3ead9;color:var(--accentDk);border:none;border-radius:12px;font-size:12px;font-weight:800;padding:8px 12px;cursor:pointer;box-shadow:0 3px 0 #e0d2bb;}
  .tg.off{opacity:.4;}
  .tip{margin-top:10px;font-size:11px;color:var(--soft);text-align:center;line-height:1.7;}
  .start,.overlay{position:absolute;inset:0;background:rgba(250,245,236,.95);border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:24px;text-align:center;z-index:30;}
  .overlay{display:none;}.overlay.show{display:flex;}.start.hide{display:none;}
  h2{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:1px;}
  .res{font-size:15px;color:var(--soft);}.res b{color:var(--accentDk);font-size:24px;}
  .gain{font-size:14px;color:var(--gold);font-weight:800;}
  .hist{font-size:12px;color:var(--soft);}
  .sub{font-size:12px;color:var(--soft);margin-top:-2px;margin-bottom:3px;line-height:1.6;}
  .banner{position:absolute;top:42%;left:0;right:0;text-align:center;font-size:25px;font-weight:800;color:var(--sageDk);pointer-events:none;opacity:0;z-index:20;text-shadow:0 2px 12px rgba(255,255,255,.9);}
  .banner.show{animation:bn 1.2s ease;}
  @keyframes bn{0%{opacity:0;transform:scale(.6);}25%{opacity:1;transform:scale(1.1);}75%{opacity:1;}100%{opacity:0;}}
  .winflash{position:absolute;inset:0;pointer-events:none;z-index:19;opacity:0;background:radial-gradient(circle at 50% 45%,rgba(220,171,77,.4),transparent 66%);}
  .winflash.go{animation:wf .7s ease;}
  @keyframes wf{0%{opacity:.8;}100%{opacity:0;}}
  .confetti{position:absolute;pointer-events:none;z-index:21;will-change:transform,opacity;transition:transform .9s ease-out,opacity .9s ease-out;}
  .skinlist{display:flex;flex-direction:column;gap:8px;width:min(88%,320px);max-height:54%;overflow:auto;}
  .skinrow{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:9px 13px;font-size:14px;font-weight:700;box-shadow:0 2px 8px var(--shadow);}
  .skinrow .btn{padding:7px 14px;font-size:12px;}
  .modal{position:fixed;inset:0;background:rgba(70,55,35,.4);display:none;align-items:center;justify-content:center;z-index:80;}
  .modal.show{display:flex;}
  .card{background:var(--card);border-radius:20px;padding:26px;text-align:center;display:flex;flex-direction:column;gap:13px;max-width:290px;box-shadow:0 14px 40px rgba(90,70,40,.3);}
  .card .msg{font-size:14px;color:var(--soft);line-height:1.9;}
  .card .msg b{color:var(--accentDk);font-size:18px;}
</style>
</head>
<body>
  <div class="top">
    <div class="title">一触连爆<small>CHAIN REACTION</small></div>
    <div class="stat">
      <div class="box"><div class="l">分数</div><div class="v" id="score">0</div></div>
      <div class="box"><div class="l">最高</div><div class="v" id="best">0</div></div>
    </div>
  </div>

  <div class="order">
    <span id="hudL">—</span>
    <span class="prog" id="hudR">—</span>
  </div>

  <div class="wrap" id="wrap">
    <div class="combo" id="combo"></div>
    <div class="winflash" id="winflash"></div>
    <div class="banner" id="banner"></div>

    <div class="start" id="startScreen">
      <h2>一触连爆</h2>
      <div class="sub">点一下，引爆连锁<br>碰到的小球会跟着炸开</div>
      <button class="btn" id="modeEndless">闯关模式</button>
      <div class="sub">每关一次点击，炸够目标过关</div>
      <button class="btn ghost" id="modeClear">清屏模式</button>
      <div class="sub">有限次点击清空全场，用得越少星越多</div>
      <button class="btn ghost" id="modeDaily">每日挑战</button>
      <div class="sub" id="dailyInfo">每天一套固定关卡，和朋友比高分</div>
      <button class="btn ghost" id="openSkins">外观皮肤</button>
    </div>

    <div class="overlay" id="overlay">
      <h2 id="ovTitle">结束</h2>
      <div class="res" id="ovLine">—</div>
      <div class="gain" id="ovGain"></div>
      <div class="res" id="ovBest"></div>
      <div class="hist" id="ovHist"></div>
      <button class="btn" id="againBtn">再来一局</button>
      <button class="btn ghost" id="menuBtn">换模式</button>
    </div>

    <div class="overlay" id="rescue">
      <h2>还差一点！</h2>
      <div class="res" id="rescueMsg">—</div>
      <button class="btn" id="rescueBtn">再炸一次</button>
      <button class="btn ghost" id="giveupBtn">结束</button>
    </div>

    <div class="overlay" id="skinPanel">
      <h2>外观皮肤</h2>
      <div class="sub">用金币解锁，给小球换个质感</div>
      <div class="skinlist" id="skinList"></div>
      <button class="btn ghost" id="skinClose">返回</button>
    </div>
  </div>

  <div class="items">
    <span class="coins"><span class="coin-ico"></span><span id="coins">0</span></span>
    <button class="item" id="itemCross">十字炸 · 装备 30金</button>
  </div>

  <div class="controls">
    <button class="tg" id="sfx">音效</button>
    <button class="tg" id="bgm">音乐</button>
    <button class="tg" id="vib">震动</button>
  </div>

  <div class="tip">瞄准小球最密的地方点下去，连锁越长分越高</div>

  <input type="file" id="skinUpload" accept="image/*" style="display:none">

  <div class="modal" id="signin">
    <div class="card">
      <h2>每日签到</h2>
      <div class="msg" id="signinMsg"></div>
      <button class="btn" id="signinOk">领取</button>
    </div>
  </div>

<script>
const $=id=>document.getElementById(id);
const COLORS=["#e8927c","#e9b15a","#a9c47f","#eccb7a","#d98e6e","#c0cf8e","#e6a6a0"];
const THEMES=[
  "linear-gradient(160deg,#fbf4e6,#f3e7d2)",
  "linear-gradient(160deg,#eef3e2,#dde8c8)",
  "linear-gradient(160deg,#fbeadf,#f5d8c6)",
  "linear-gradient(160deg,#f6ecdf,#ecdcc2)",
  "linear-gradient(160deg,#fbe9e7,#f3d3cf)"
];
const SKINS=[{id:"classic",name:"糖霜 · 经典",cost:0},{id:"jelly",name:"果冻",cost:150},{id:"matte",name:"奶油哑光",cost:300},{id:"glow",name:"柔光",cost:400},{id:"custom",name:"自定义 · 上传图片",cost:0}];
const wrap=$("wrap");
let W,H,bubbles,rings,obstacles,level,score,best,bestKey,popped,goal,chainN,playing,resolving,raf,lastT;
let mode="endless",tapUsed,tapsLeft,totalStars,chaining=false,shakeMag=0,actx=null,armed=null,continues=0,rng=Math.random;
let coins=parseInt(localStorage.getItem("cb_coins")||"0");
let sfxOn=localStorage.getItem("cb_sfx")!=="0", bgmOn=localStorage.getItem("cb_bgm")!=="0", vibOn=localStorage.getItem("cb_vib")!=="0";
let ownedSkins, selectedSkin;
const COST={cross:30};

function rectsize(){const r=wrap.getBoundingClientRect();W=r.width;H=r.height;}

/* ---------- audio ---------- */
let master=null,comp=null;
function initAudio(){ if(actx)return; try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){actx=null;}
  if(actx){ comp=actx.createDynamicsCompressor(); comp.threshold.value=-8;comp.knee.value=18;comp.ratio.value=12;comp.attack.value=0.003;comp.release.value=0.25;
    master=actx.createGain(); master.gain.value=1.0; comp.connect(master); master.connect(actx.destination); } }
function dest(){ return comp||actx.destination; }
function playPop(d){ if(!actx||!sfxOn)return; const f=261.6*Math.pow(2,Math.min(d-1,28)/12);
  const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime; o.type="triangle";o.frequency.value=f;
  g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.7,t+0.008);g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g);g.connect(dest());o.start(t);o.stop(t+0.18); }
let bgmGain=null,bgmTimer=null,bgmIdx=0;
const PROG=[[261.63,329.63,392.00],[220.00,261.63,329.63],[174.61,220.00,261.63],[196.00,246.94,293.66]];
const ARP=[0,1,2,1,0,1,2,1];
function bgmTone(freq,dur,type,vol){ const o=actx.createOscillator(),g=actx.createGain(),t=actx.currentTime;
  o.type=type;o.frequency.value=freq; g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(bgmGain);o.start(t);o.stop(t+dur+0.06); }
function startBGM(){ if(!actx||!bgmOn||bgmTimer)return;
  if(!bgmGain){bgmGain=actx.createGain();bgmGain.gain.value=1.0;bgmGain.connect(dest());}
  const stepFn=()=>{ if(!bgmOn){bgmTimer=null;return;}
    const chord=PROG[Math.floor(bgmIdx/8)%PROG.length], w=bgmIdx%8;
    bgmTone(chord[ARP[w]],0.55,"sine",0.30);
    if(w===0) bgmTone(chord[0]/2,1.4,"triangle",0.26);
    bgmIdx++; bgmTimer=setTimeout(stepFn,380); };
  stepFn(); }
function stopBGM(){ if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;} }
function buzz(ms){ if(vibOn&&navigator.vibrate)navigator.vibrate(ms); }

/* ---------- skins ---------- */
function loadSkins(){ try{ownedSkins=JSON.parse(localStorage.getItem("cb_skins")||'["classic"]');}catch(e){ownedSkins=["classic"];} selectedSkin=localStorage.getItem("cb_skin")||"classic"; }
function saveSkins(){ localStorage.setItem("cb_skins",JSON.stringify(ownedSkins)); localStorage.setItem("cb_skin",selectedSkin); }
function applySkin(el,color,r){
  el.style.display="";el.style.alignItems="";el.style.justifyContent="";el.textContent="";el.style.border="1px solid rgba(120,90,60,.07)";el.style.backgroundImage="";el.style.color="";el.innerHTML="";
  switch(selectedSkin){
    case "jelly": el.style.background="radial-gradient(circle at 32% 26%, rgba(255,255,255,.95), "+color+" 72%)"; el.style.boxShadow="0 3px 8px var(--shadow), inset 0 -4px 8px rgba(120,80,40,.14)"; break;
    case "matte": el.style.background=color; el.style.boxShadow="0 3px 8px var(--shadow)"; el.style.border="3px solid rgba(255,255,255,.55)"; break;
    case "glow": el.style.background=color; el.style.boxShadow="0 0 13px "+color+", 0 0 22px "+color; break;
    case "custom": { const img=localStorage.getItem("cb_customimg"); if(img){ el.style.background="#fff"; el.style.backgroundImage="url("+img+")"; el.style.backgroundSize="cover"; el.style.backgroundPosition="center"; el.style.boxShadow="0 3px 8px var(--shadow)"; } else { el.style.background=color; } break; }
    default: el.style.background="radial-gradient(circle at 35% 30%, rgba(255,255,255,.82), "+color+" 74%)"; el.style.boxShadow="0 3px 7px var(--shadow)";
  }
}
function renderSkinList(){
  const box=$("skinList"); box.innerHTML="";
  SKINS.forEach(s=>{
    const owned=s.cost===0||ownedSkins.includes(s.id), sel=selectedSkin===s.id;
    const row=document.createElement("div"); row.className="skinrow";
    const lab=document.createElement("span"); lab.textContent=s.name;
    const btn=document.createElement("button"); btn.className="btn ghost";
    if(s.id==="custom"){ btn.textContent=(sel?"使用中 · 换图":"上传图片并使用"); btn.onclick=()=>$("skinUpload").click(); }
    else if(sel){ btn.textContent="使用中"; btn.disabled=true; }
    else if(owned){ btn.textContent="使用"; btn.onclick=()=>{ selectedSkin=s.id; saveSkins(); renderSkinList(); }; }
    else { btn.textContent="解锁 "+s.cost+"金"; btn.disabled=coins<s.cost; btn.onclick=()=>{ if(coins>=s.cost){ setCoins(coins-s.cost); ownedSkins.push(s.id); selectedSkin=s.id; saveSkins(); renderSkinList(); } }; }
    row.appendChild(lab); row.appendChild(btn); box.appendChild(row);
  });
}

/* ---------- daily login ---------- */
function dayStr(off){ const d=new Date(Date.now()-(off||0)*86400000); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
function checkDailyLogin(){
  const today=dayStr(0), last=localStorage.getItem("cb_lastlogin");
  if(last===today) return;
  let streak=parseInt(localStorage.getItem("cb_streak")||"0");
  streak = (last===dayStr(1)) ? streak+1 : 1;
  const reward = 30 + Math.min(streak,7)*10;
  setCoins(coins+reward);
  localStorage.setItem("cb_lastlogin",today); localStorage.setItem("cb_streak",String(streak));
  $("signinMsg").innerHTML = "连续登录 <b>"+streak+"</b> 天<br>获得 <b>"+reward+"</b> 金币<br><span style='font-size:12px;color:#9b8f7c'>明天再来，连得越久送越多</span>";
  $("signin").classList.add("show");
}

/* ---------- configs ---------- */
function levelConf(lv){ const c=Math.min(38,14+lv*2); return {count:c,goal:Math.max(3,Math.ceil(c*Math.min(0.85,0.18+lv*0.055))),speed:Math.min(2.4,0.9+lv*0.06)}; }
function clearConf(lv){ return {count:Math.min(46,18+lv*3),budget:5,obs:Math.min(6,lv-1),speed:Math.min(2.2,0.9+lv*0.05)}; }
function setHUD(l,r){ $("hudL").innerHTML=l; $("hudR").innerHTML=r; }
function clearHudL(){ $("hudL").innerHTML="第 <b>"+level+"</b> 关 · 剩 <b>"+tapsLeft+"</b> 击"; }
function setCoins(v){ coins=v; localStorage.setItem("cb_coins",coins); $("coins").textContent=coins; refreshItems(); }

/* ---------- game ---------- */
function dailySeed(){ const d=new Date(); return (d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate())>>>0; }
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function start(m){ mode=m; initAudio(); if(actx&&actx.state==="suspended")actx.resume(); startBGM();
  if(m==="daily"){ rng=mulberry32(dailySeed()); const today=dayStr(0); if(localStorage.getItem("cb_daily_date")!==today){localStorage.setItem("cb_daily_date",today);localStorage.setItem("cb_daily_best","0");} bestKey="cb_daily_best"; }
  else { rng=Math.random; bestKey=(m==="endless"?"cb_best_e":"cb_best_c"); }
  best=parseInt(localStorage.getItem(bestKey)||"0"); $("best").textContent=best;
  level=1; score=0; totalStars=0; armed=null; continues=0; $("score").textContent=0; $("startScreen").classList.add("hide"); startLevel(); }
function applyTheme(lv){ wrap.style.background=THEMES[(lv-1)%THEMES.length]; }

function spawnBubble(speed){
  const rnd=rng(); let kind="normal";
  const early=(mode!=="clear"&&level<=3);
  if(!early){
    if(mode==="clear"){ if(rnd<0.04)kind="big"; else if(rnd<0.13)kind="cross"; else if(rnd<0.18)kind="plus"; }
    else { if(rnd<0.03)kind="big"; else if(rnd<0.11)kind="cross"; }
  }
  const baseR=Math.max(10,16-level*0.4);
  const r=(kind==="big"?baseR+7:baseR+rng()*3);
  const color=COLORS[Math.floor(rng()*COLORS.length)];
  const b={x:r+rng()*(W-2*r),y:r+rng()*(H-2*r),vx:(rng()-.5)*1.3*speed,vy:(rng()-.5)*1.3*speed,r,color,kind,alive:true,el:null};
  const el=document.createElement("div");el.className="bub";
  el.style.width=el.style.height=(r*2)+"px";
  if(kind==="normal"){ applySkin(el,color,r); }
  else if(kind==="cross"){ el.style.background="radial-gradient(circle at 35% 30%, rgba(255,255,255,.82), "+color+" 74%)"; el.style.border="3px solid #fff"; el.style.boxShadow="0 3px 8px var(--shadow)";
    el.style.display="flex";el.style.alignItems="center";el.style.justifyContent="center";
    const m=document.createElement("span"); m.className="m-cross"; const sz=Math.round(r*1.15); m.style.width=sz+"px"; m.style.height=sz+"px"; el.appendChild(m); }
  else if(kind==="big"){ el.style.background="radial-gradient(circle at 35% 30%,#fbe8bd,"+'var(--gold)'+" 75%)"; el.classList.add("big-ball"); }
  else if(kind==="plus"){ el.style.background="radial-gradient(circle at 35% 30%,#d9ecc2,"+'var(--sage)'+" 75%)"; el.style.display="flex";el.style.alignItems="center";el.style.justifyContent="center"; el.style.color="#fff"; el.style.fontWeight="800"; el.style.fontSize=(r*0.85)+"px"; el.textContent="+1"; }
  wrap.appendChild(el);b.el=el;bubbles.push(b);
}
function spawnObstacles(n){ for(let i=0;i<n;i++){ const r=16+Math.random()*6; const o={x:r+Math.random()*(W-2*r),y:r+Math.random()*(H-2*r),r};
  const el=document.createElement("div");el.className="obs";el.style.width=el.style.height=(r*2)+"px";el.style.left=(o.x-r)+"px";el.style.top=(o.y-r)+"px";
  wrap.appendChild(el);o.el=el;obstacles.push(o);} }
function aliveCount(){ return bubbles.filter(b=>b.alive).length; }

function startLevel(){
  rectsize(); wrap.querySelectorAll(".bub,.ring,.part,.beam,.obs").forEach(e=>e.remove());
  bubbles=[];rings=[];obstacles=[];popped=0;chainN=0;resolving=false;playing=true;shakeMag=0;chaining=false;armed=null;refreshItems();
  applyTheme(level); $("overlay").classList.remove("show"); $("rescue").classList.remove("show"); $("skinPanel").classList.remove("show");
  if(mode!=="clear"){ const cf=levelConf(level);goal=cf.goal;tapUsed=false; for(let i=0;i<cf.count;i++)spawnBubble(cf.speed);
    setHUD((mode==="daily"?"每日 · ":"")+"第 <b>"+level+"</b> 关 · 目标 <b>"+goal+"</b>","已炸 <b>0</b>"); }
  else { const c=clearConf(level);tapsLeft=c.budget;tapUsed=false; spawnObstacles(c.obs); for(let i=0;i<c.count;i++)spawnBubble(c.speed);
    clearHudL(); $("hudR").innerHTML="剩 <b>"+aliveCount()+"</b> 球"; }
  lastT=performance.now();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
}

function addRing(x,y,maxR){ rings.push({x,y,r:0,maxR:maxR||46,t:0,el:null}); }

function loop(t){
  if(!playing)return; const dt=Math.min(50,t-lastT);lastT=t;
  if(shakeMag>0.3){ wrap.style.transform=`translate(${(Math.random()-.5)*shakeMag}px,${(Math.random()-.5)*shakeMag}px)`; shakeMag*=0.86; } else if(shakeMag){shakeMag=0;wrap.style.transform="";}
  bubbles.forEach(b=>{ if(!b.alive)return; b.x+=b.vx;b.y+=b.vy;
    if(b.x<b.r){b.x=b.r;b.vx*=-1;} if(b.x>W-b.r){b.x=W-b.r;b.vx*=-1;} if(b.y<b.r){b.y=b.r;b.vy*=-1;} if(b.y>H-b.r){b.y=H-b.r;b.vy*=-1;}
    obstacles.forEach(o=>{ const dx=b.x-o.x,dy=b.y-o.y,d=Math.hypot(dx,dy)||1; if(d<b.r+o.r){ const nx=dx/d,ny=dy/d;b.x=o.x+nx*(b.r+o.r);b.y=o.y+ny*(b.r+o.r);const dot=b.vx*nx+b.vy*ny;b.vx-=2*dot*nx;b.vy-=2*dot*ny; } });
    b.el.style.left=(b.x-b.r)+"px";b.el.style.top=(b.y-b.r)+"px"; });
  for(let i=rings.length-1;i>=0;i--){ const rg=rings[i];rg.t+=dt;
    if(rg.t<300)rg.r=rg.maxR*rg.t/300; else if(rg.t<560)rg.r=rg.maxR; else if(rg.t<800)rg.r=rg.maxR*(1-(rg.t-560)/240); else {rg.el&&rg.el.remove();rings.splice(i,1);continue;}
    if(!rg.el){rg.el=document.createElement("div");rg.el.className="ring";wrap.appendChild(rg.el);}
    rg.el.style.left=rg.x+"px";rg.el.style.top=rg.y+"px";rg.el.style.width=rg.el.style.height=(rg.r*2)+"px";rg.el.style.opacity=String(Math.max(0,1-rg.t/800));
    if(rg.t<560){ bubbles.forEach(b=>{ if(b.alive&&Math.hypot(b.x-rg.x,b.y-rg.y)<rg.r+b.r)popBubble(b); }); } }
  if(chaining&&rings.length===0){ chaining=false; postChain(); }
  raf=requestAnimationFrame(loop);
}

function popBubble(b){
  b.alive=false;chainN++;popped++;score+=chainN; $("score").textContent=score;
  if(score>best){best=score;localStorage.setItem(bestKey,best);$("best").textContent=best;}
  b.el.classList.add("pop");playPop(chainN);buzz(10);particles(b.x,b.y,b.color);
  shakeMag=Math.min(11,shakeMag+1.6+chainN*0.18);showCombo();
  if(mode!=="clear")$("hudR").innerHTML="已炸 <b>"+popped+"</b>"; else $("hudR").innerHTML="剩 <b>"+aliveCount()+"</b> 球";
  if(b.kind==="cross")crossBlast(b.x,b.y);
  else if(b.kind==="big")addRing(b.x,b.y,96);
  else if(b.kind==="plus"){addRing(b.x,b.y); if(mode==="clear"){tapsLeft++;clearHudL();banner("+1 点击");}}
  else addRing(b.x,b.y);
}
function crossBlast(x,y){ addRing(x,y,58);beam(y,true);beam(x,false);shakeMag=Math.min(13,shakeMag+4);
  const band=33; bubbles.forEach(bb=>{ if(bb.alive&&(Math.abs(bb.y-y)<band||Math.abs(bb.x-x)<band))popBubble(bb); }); }
function beam(p,h){ const d=document.createElement("div");d.className="beam";
  if(h){d.style.left="0";d.style.right="0";d.style.top=(p-3)+"px";d.style.height="6px";} else {d.style.top="0";d.style.bottom="0";d.style.left=(p-3)+"px";d.style.width="6px";}
  wrap.appendChild(d);setTimeout(()=>d.remove(),420); }
function particles(x,y,color){ for(let i=0;i<5;i++){ const p=document.createElement("div");p.className="part";const s=4+Math.random()*5;
  p.style.width=p.style.height=s+"px";p.style.background=color;p.style.left=(x-s/2)+"px";p.style.top=(y-s/2)+"px";p.style.boxShadow="0 0 6px "+color;wrap.appendChild(p);
  const a=Math.random()*Math.PI*2,dd=18+Math.random()*34; requestAnimationFrame(()=>{p.style.transform=`translate(${Math.cos(a)*dd}px,${Math.sin(a)*dd}px)`;p.style.opacity="0";}); setTimeout(()=>p.remove(),520);} }
let comboHideT=null; function showCombo(){ if(chainN<3)return; const c=$("combo"); c.textContent="连锁 x"+chainN; c.style.fontSize=Math.min(50,22+chainN*1.5)+"px"; c.classList.add("show"); clearTimeout(comboHideT); comboHideT=setTimeout(()=>c.classList.remove("show"),700); }

function tap(e){
  if(!playing||resolving||rings.length>0)return;
  if(mode!=="clear"&&tapUsed)return; if(mode==="clear"&&tapsLeft<=0)return;
  initAudio(); if(actx&&actx.state==="suspended")actx.resume(); startBGM();
  const r=wrap.getBoundingClientRect(); const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left; const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
  buzz(20);chainN=0;tapUsed=true;chaining=true;
  if(mode==="clear"){tapsLeft--;clearHudL();}
  if(armed==="cross"){ crossBlast(x,y); armed=null; refreshItems(); }
  else addRing(x,y);
}

function postChain(){
  if(mode!=="clear"){ resolving=true;playing=false;cancelAnimationFrame(raf);wrap.style.transform="";
    if(popped>=goal){ celebrate("过关啦！");level++;setTimeout(startLevel,1300); } else tryRescueOrEnd(); }
  else { if(aliveCount()===0){ const usedTaps=clearConf(level).budget-tapsLeft;
      const stars=usedTaps<=2?3:(usedTaps<=3?2:1); totalStars+=stars; score+=Math.max(0,tapsLeft)*60*level; $("score").textContent=score;
      if(score>best){best=score;localStorage.setItem(bestKey,best);$("best").textContent=best;}
      resolving=true;playing=false;cancelAnimationFrame(raf);wrap.style.transform=""; celebrate("清屏！ "+"★".repeat(stars));level++;setTimeout(startLevel,1400);
    } else if(tapsLeft<=0){ resolving=true;playing=false;cancelAnimationFrame(raf);wrap.style.transform=""; tryRescueOrEnd(); }
    else { $("hudR").innerHTML="剩 <b>"+aliveCount()+"</b> 球"; } }
}

function rescueCost(){ return 30*Math.pow(2,continues); }
function tryRescueOrEnd(){ if(coins>=rescueCost()) offerRescue(); else gameOver(); }
function offerRescue(){
  const cost=rescueCost();
  $("rescueMsg").innerHTML = mode==="endless" ? "还差 <b>"+(goal-popped)+"</b> 个就过关！" : "还剩 <b>"+aliveCount()+"</b> 个没清掉！";
  const btn=$("rescueBtn"); btn.textContent="再炸一次（"+cost+"金）"; btn.disabled=coins<cost;
  $("rescue").classList.add("show");
}
function doRescue(){
  const cost=rescueCost(); if(coins<cost)return;
  setCoins(coins-cost); continues++;
  $("rescue").classList.remove("show");
  resolving=false; playing=true; chaining=false; tapUsed=false;
  if(mode==="clear"){ tapsLeft+=2; clearHudL(); $("hudR").innerHTML="剩 <b>"+aliveCount()+"</b> 球"; }
  lastT=performance.now(); cancelAnimationFrame(raf); raf=requestAnimationFrame(loop);
}

function banner(txt){const b=$("banner");b.textContent=txt;b.classList.remove("show");void b.offsetWidth;b.classList.add("show");}
function confetti(){ for(let i=0;i<30;i++){ const p=document.createElement("div");p.className="confetti";
  const s=6+Math.random()*7; p.style.width=p.style.height=s+"px"; p.style.background=COLORS[i%COLORS.length]; p.style.borderRadius=(Math.random()<0.5?"50%":"2px");
  p.style.left=(W/2)+"px"; p.style.top=(H*0.4)+"px"; wrap.appendChild(p);
  const ang=Math.random()*Math.PI*2, dist=70+Math.random()*170; const tx=Math.cos(ang)*dist, ty=Math.sin(ang)*dist+120;
  requestAnimationFrame(()=>{ p.style.transform=`translate(${tx}px,${ty}px) rotate(${Math.random()*720}deg)`; p.style.opacity="0"; }); setTimeout(()=>p.remove(),950); } }
function fanfare(){ if(!actx||!sfxOn)return; [0,4,7,12].forEach((semi,i)=>setTimeout(()=>{
    const f=392*Math.pow(2,semi/12), o=actx.createOscillator(), g=actx.createGain(), t=actx.currentTime; o.type="triangle"; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.7,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+0.3);
    o.connect(g);g.connect(dest());o.start(t);o.stop(t+0.32); }, i*95)); }
function celebrate(txt){ banner(txt); confetti(); fanfare(); const f=$("winflash"); f.classList.remove("go"); void f.offsetWidth; f.classList.add("go"); buzz([20,40,30]); }
function pushHistory(s){ const k="cb_hist_"+mode; let h=[]; try{h=JSON.parse(localStorage.getItem(k)||"[]");}catch(e){} h.unshift(s);h=h.slice(0,6);localStorage.setItem(k,JSON.stringify(h));return h; }
function gameOver(){
  buzz(120);
  const earned=Math.floor(score/12)+(mode==="clear"?totalStars*5:0);
  setCoins(coins+earned);
  if(mode!=="clear"){ $("ovTitle").textContent=popped>0?"差一点…只炸了 "+popped+"/"+goal:"歪了，一颗都没炸到"; $("ovLine").innerHTML=(mode==="daily"?"每日挑战 · ":"")+"打到第 <b>"+level+"</b> 关 · 得分 <b>"+score+"</b>"; }
  else { $("ovTitle").textContent="没清完…"; $("ovLine").innerHTML="到第 <b>"+level+"</b> 关 · 星 <b>"+totalStars+"</b> · 得分 <b>"+score+"</b>"; }
  $("ovGain").textContent="金币 +"+earned+"（共 "+coins+"）";
  $("ovBest").textContent = score>=best ? "新纪录！" : "最高分 "+best;
  const h=pushHistory(score); $("ovHist").textContent="最近："+h.join(" · ");
  setTimeout(()=>$("overlay").classList.add("show"),350);
}

/* ---------- items / settings ---------- */
function refreshItems(){ [["itemCross","cross"]].forEach(([id,key])=>{ const el=$(id); el.classList.toggle("armed",armed===key); el.classList.toggle("poor",coins<COST[key]); }); }
function armItem(key){ if(armed===key){ armed=null; refreshItems(); return; }
  if(!playing){ banner("开局后再用道具"); return; }
  if(coins<COST[key]){ banner("金币不够"); return; }
  if(rings.length>0) return;
  setCoins(coins-COST[key]); armed=key; refreshItems(); }
$("itemCross").onclick=()=>armItem("cross");
function refreshToggles(){ $("sfx").classList.toggle("off",!sfxOn);$("bgm").classList.toggle("off",!bgmOn);$("vib").classList.toggle("off",!vibOn); }
$("sfx").onclick=()=>{sfxOn=!sfxOn;localStorage.setItem("cb_sfx",sfxOn?"1":"0");refreshToggles();};
$("bgm").onclick=()=>{bgmOn=!bgmOn;localStorage.setItem("cb_bgm",bgmOn?"1":"0");if(bgmOn)startBGM();else stopBGM();refreshToggles();};
$("vib").onclick=()=>{vibOn=!vibOn;localStorage.setItem("cb_vib",vibOn?"1":"0");if(vibOn)buzz(20);refreshToggles();};

/* ---------- wiring ---------- */
wrap.addEventListener("pointerdown",e=>{e.preventDefault();tap(e);});
function updateDailyInfo(){ const today=dayStr(0); const bd=(localStorage.getItem("cb_daily_date")===today)?(localStorage.getItem("cb_daily_best")||"0"):"0"; $("dailyInfo").textContent="每天一套固定关卡 · 今日最佳 "+bd+" 分"; }
$("modeEndless").onclick=()=>start("endless");
$("modeClear").onclick=()=>start("clear");
$("modeDaily").onclick=()=>start("daily");
$("openSkins").onclick=()=>{ renderSkinList(); $("startScreen").classList.add("hide"); $("skinPanel").classList.add("show"); };
$("skinClose").onclick=()=>{ $("skinPanel").classList.remove("show"); $("startScreen").classList.remove("hide"); };
$("skinUpload").onchange=e=>{ const f=e.target.files&&e.target.files[0]; if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{ const img=new Image(); img.onload=()=>{
    const sz=128, c=document.createElement("canvas"); c.width=c.height=sz; const ctx=c.getContext("2d");
    const s=Math.min(img.width,img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
    ctx.drawImage(img,sx,sy,s,s,0,0,sz,sz);
    const data=c.toDataURL("image/jpeg",0.82);
    try{ localStorage.setItem("cb_customimg",data); if(!ownedSkins.includes("custom"))ownedSkins.push("custom"); selectedSkin="custom"; saveSkins(); renderSkinList(); }
    catch(err){ alert("图片存不下，换张更小的试试"); }
  }; img.onerror=()=>alert("图片读取失败"); img.src=ev.target.result; };
  reader.readAsDataURL(f); e.target.value=""; };
$("againBtn").onclick=()=>start(mode);
$("rescueBtn").onclick=doRescue;
$("giveupBtn").onclick=()=>{ $("rescue").classList.remove("show"); gameOver(); };
$("menuBtn").onclick=()=>{ $("overlay").classList.remove("show"); wrap.querySelectorAll(".bub,.ring,.part,.beam,.obs").forEach(e=>e.remove()); $("startScreen").classList.remove("hide"); playing=false; armed=null; refreshItems(); setHUD("—","—"); updateDailyInfo(); };
$("signinOk").onclick=()=>$("signin").classList.remove("show");
window.addEventListener("resize",()=>{if(playing)rectsize();});
loadSkins(); $("coins").textContent=coins; refreshToggles(); refreshItems(); updateDailyInfo(); checkDailyLogin();
</script>
</body>
</html>
