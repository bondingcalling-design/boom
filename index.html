<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>一触连爆 · 一点引爆连锁</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0a0b12;--panel:#171a28;--accent:#ffd24a;--ok:#3ddc84;}
  html,body{height:100%;overscroll-behavior:none;}
  body{background:radial-gradient(130% 100% at 50% -10%,#202644 0%,#0a0b12 62%);
    color:#fff;font-family:-apple-system,"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding:14px 12px 22px;min-height:100%;user-select:none;overflow:hidden;touch-action:none;}
  .top{width:100%;max-width:430px;display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;}
  .title{font-size:20px;font-weight:900;letter-spacing:1px;}
  .title small{display:block;font-size:10px;color:#8b90b8;letter-spacing:2px;margin-top:2px;font-weight:600;}
  .stat{display:flex;gap:8px;}
  .box{background:var(--panel);border-radius:11px;padding:6px 12px;text-align:center;min-width:64px;}
  .box .l{font-size:9px;color:#7c82ad;letter-spacing:1px;}
  .box .v{font-size:18px;font-weight:900;line-height:1.1;}
  .order{width:100%;max-width:430px;display:flex;align-items:center;justify-content:space-between;
    background:var(--panel);border-radius:12px;padding:9px 14px;margin:6px 0 8px;font-size:13px;font-weight:800;color:#cfd3f5;}
  .order .goal{color:var(--accent);}
  .order .prog{font-size:16px;}
  .order .prog b{color:var(--ok);}
  .wrap{position:relative;width:min(94vw,430px);flex:1;min-height:400px;
    background:linear-gradient(160deg,#12152a,#0c0e1c);border-radius:20px;overflow:hidden;
    box-shadow:inset 0 0 60px rgba(80,100,200,.08);}
  .bub{position:absolute;border-radius:50%;will-change:left,top,transform;}
  .bub.pop{animation:pp .3s ease forwards;}
  @keyframes pp{0%{transform:scale(1);}45%{transform:scale(1.6);}100%{transform:scale(0);opacity:0;}}
  .ring{position:absolute;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;
    border:2px solid rgba(255,255,255,.9);
    background:radial-gradient(circle,rgba(255,255,255,.18) 0%,rgba(255,255,255,.05) 60%,transparent 72%);
    box-shadow:0 0 26px rgba(160,200,255,.6);}
  .part{position:absolute;border-radius:50%;pointer-events:none;will-change:transform,opacity;
    transition:transform .5s ease-out,opacity .5s ease-out;}
  .combo{position:absolute;top:30%;left:0;right:0;text-align:center;pointer-events:none;z-index:18;
    font-weight:900;color:#fff;text-shadow:0 0 18px rgba(255,210,74,.9);opacity:0;}
  .combo.show{opacity:1;}
  .controls{margin-top:14px;display:flex;justify-content:center;gap:10px;width:100%;max-width:430px;}
  .btn{background:var(--accent);color:#3a2c00;border:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:900;cursor:pointer;}
  .btn.ghost{background:#2a2d44;color:#cfd3f5;}
  .start .btn,.overlay .btn{width:min(72%,220px);}
  .controls .btn{font-size:13px;padding:9px 24px;}
  .tip{margin-top:10px;font-size:12px;color:#7c82ad;text-align:center;line-height:1.7;}
  .start,.overlay{position:absolute;inset:0;background:rgba(9,10,18,.94);border-radius:20px;display:flex;
    flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:22px;text-align:center;z-index:30;}
  .overlay{display:none;}.overlay.show{display:flex;}.start.hide{display:none;}
  h2{font-size:24px;}.res{font-size:15px;color:#cfd3f5;}.res b{color:var(--accent);font-size:28px;}
  .start p{font-size:13px;color:#9a9fc4;line-height:1.9;}
  .banner{position:absolute;top:44%;left:0;right:0;text-align:center;font-size:26px;font-weight:900;color:var(--ok);pointer-events:none;opacity:0;z-index:20;text-shadow:0 0 20px rgba(61,220,132,.7);}
  .banner.show{animation:bn 1.1s ease;}
  @keyframes bn{0%{opacity:0;transform:scale(.5);}25%{opacity:1;transform:scale(1.12);}75%{opacity:1;}100%{opacity:0;}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#fff;color:#222;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:800;opacity:0;transition:.25s;pointer-events:none;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .muteBtn{background:none;border:none;color:#7c82ad;font-size:18px;cursor:pointer;padding:4px;}
</style>
</head>
<body>
  <div class="top">
    <div class="title">一触连爆<small>ONE TAP · CHAIN REACTION</small></div>
    <div class="stat">
      <div class="box"><div class="l">分数</div><div class="v" id="score">0</div></div>
      <div class="box"><div class="l">最高</div><div class="v" id="best">0</div></div>
    </div>
  </div>

  <div class="order">
    <span>第 <span class="goal" id="level">1</span> 关 · 目标 <span class="goal" id="goal">3</span></span>
    <span class="prog">已炸 <b id="popped">0</b></span>
    <button class="muteBtn" id="mute" title="音效">🔊</button>
  </div>

  <div class="wrap" id="wrap">
    <div class="combo" id="combo"></div>
    <div class="banner" id="banner"></div>
    <div class="start" id="startScreen">
      <h2>💥 一点，引爆连锁</h2>
      <p>满屏漂浮的球，你<b>每关只能点一下</b><br>点中处炸开 → 碰到的球跟着炸 → 连环引爆<br>炸够目标数就<b>过关</b>，连得越长分越高<br>瞄准最密的地方，一口气炸一大片！</p>
      <button class="btn" id="startBtn">开始</button>
    </div>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">差一点…</h2>
      <div class="res">打到第 <b id="ovLevel">1</b> 关 · 得分 <b id="ovScore">0</b></div>
      <div class="res" id="ovBest"></div>
      <button class="btn" id="againBtn">再来一局</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn ghost" id="restartBtn">重新开始</button>
  </div>

  <div class="tip">连锁越长，分数越高、音越亢奋——找球最密的点下手 🎯</div>

<script>
const $=id=>document.getElementById(id);
const COLORS=["#ff7eb6","#7afcff","#feff9c","#a3ff8c","#c79bff","#ff9b6b","#6ba8ff"];
const wrap=$("wrap");
let W,H,bubbles,rings,level,score,best,popped,goal,chainN,tapUsed,playing,resolving,raf,lastT;
let shakeMag=0, muted=false, actx=null;

function rectsize(){const r=wrap.getBoundingClientRect();W=r.width;H=r.height;}

/* ---------- audio ---------- */
function initAudio(){
  if(actx)return;
  try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){actx=null;}
}
function playPop(depth){
  if(!actx||muted)return;
  const semis=Math.min(depth-1,28);
  const freq=261.6*Math.pow(2,semis/12); // C4 up the scale
  const o=actx.createOscillator(), g=actx.createGain();
  o.type="triangle"; o.frequency.value=freq;
  const t=actx.currentTime;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(0.22,t+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
  o.connect(g);g.connect(actx.destination);
  o.start(t);o.stop(t+0.18);
}

/* ---------- game ---------- */
function start(){ initAudio(); level=1; score=0; $("score").textContent=0; startLevel(); }

function startLevel(){
  rectsize();
  wrap.querySelectorAll(".bub,.ring,.part").forEach(e=>e.remove());
  bubbles=[]; rings=[]; popped=0; chainN=0; tapUsed=false; resolving=false; playing=true; shakeMag=0;
  const count=16+level*3;
  goal=Math.min(count, Math.ceil(count*(0.12+level*0.05))+1);
  $("level").textContent=level;
  $("goal").textContent=goal;
  $("popped").textContent=0;
  $("overlay").classList.remove("show");
  $("startScreen").classList.add("hide");
  for(let i=0;i<count;i++){
    const r=12+Math.random()*5;
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    const b={x:r+Math.random()*(W-2*r),y:r+Math.random()*(H-2*r),
      vx:(Math.random()-.5)*1.3,vy:(Math.random()-.5)*1.3,r,color,alive:true,el:null};
    const el=document.createElement("div");el.className="bub";
    el.style.width=el.style.height=(r*2)+"px";el.style.background=color;
    el.style.boxShadow="0 0 12px "+color;
    wrap.appendChild(el);b.el=el;bubbles.push(b);
  }
  lastT=performance.now();
  cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
}

function addRing(x,y){ rings.push({x,y,r:0,maxR:60,t:0,el:null}); }

function loop(t){
  if(!playing)return;
  const dt=Math.min(50,t-lastT);lastT=t;
  // shake
  if(shakeMag>0.3){
    wrap.style.transform=`translate(${(Math.random()-.5)*shakeMag}px,${(Math.random()-.5)*shakeMag}px)`;
    shakeMag*=0.86;
  }else if(shakeMag){shakeMag=0;wrap.style.transform="";}
  // move floating bubbles
  bubbles.forEach(b=>{
    if(!b.alive)return;
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<b.r){b.x=b.r;b.vx*=-1;} if(b.x>W-b.r){b.x=W-b.r;b.vx*=-1;}
    if(b.y<b.r){b.y=b.r;b.vy*=-1;} if(b.y>H-b.r){b.y=H-b.r;b.vy*=-1;}
    b.el.style.left=(b.x-b.r)+"px";b.el.style.top=(b.y-b.r)+"px";
  });
  // rings update + trigger
  for(let i=rings.length-1;i>=0;i--){
    const rg=rings[i];rg.t+=dt;
    if(rg.t<300) rg.r=rg.maxR*rg.t/300;
    else if(rg.t<560) rg.r=rg.maxR;
    else if(rg.t<800) rg.r=rg.maxR*(1-(rg.t-560)/240);
    else { rg.el&&rg.el.remove(); rings.splice(i,1); continue; }
    if(!rg.el){rg.el=document.createElement("div");rg.el.className="ring";wrap.appendChild(rg.el);}
    rg.el.style.left=rg.x+"px";rg.el.style.top=rg.y+"px";
    rg.el.style.width=rg.el.style.height=(rg.r*2)+"px";
    rg.el.style.opacity=String(Math.max(0,1-rg.t/800));
    if(rg.t<560){
      bubbles.forEach(b=>{
        if(!b.alive)return;
        if(Math.hypot(b.x-rg.x,b.y-rg.y)<rg.r+b.r){ popBubble(b); }
      });
    }
  }
  if(tapUsed && rings.length===0 && !resolving){ resolve(); }
  raf=requestAnimationFrame(loop);
}

function popBubble(b){
  b.alive=false;
  chainN++; popped++;
  score+=chainN;                 // later pops in a chain worth more
  $("popped").textContent=popped;
  $("score").textContent=score;
  if(score>best){best=score;localStorage.setItem("chainBest2",best);$("best").textContent=best;}
  b.el.classList.add("pop");
  playPop(chainN);
  particles(b.x,b.y,b.color);
  shakeMag=Math.min(11, shakeMag+1.6+chainN*0.18);
  showCombo();
  addRing(b.x,b.y);
}

function particles(x,y,color){
  const n=5;
  for(let i=0;i<n;i++){
    const p=document.createElement("div");p.className="part";
    const s=4+Math.random()*5;
    p.style.width=p.style.height=s+"px";p.style.background=color;
    p.style.left=(x-s/2)+"px";p.style.top=(y-s/2)+"px";
    p.style.boxShadow="0 0 6px "+color;
    wrap.appendChild(p);
    const ang=Math.random()*Math.PI*2, dist=18+Math.random()*34;
    requestAnimationFrame(()=>{
      p.style.transform=`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px)`;
      p.style.opacity="0";
    });
    setTimeout(()=>p.remove(),520);
  }
}

let comboHideT=null;
function showCombo(){
  if(chainN<3)return;
  const c=$("combo");
  c.textContent="连锁 x"+chainN+(chainN>=10?" 🔥":"");
  c.style.fontSize=Math.min(54,22+chainN*1.6)+"px";
  c.classList.add("show");
  clearTimeout(comboHideT);
  comboHideT=setTimeout(()=>c.classList.remove("show"),700);
}

function tap(e){
  if(!playing||tapUsed||resolving)return;
  initAudio(); if(actx&&actx.state==="suspended")actx.resume();
  const r=wrap.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
  tapUsed=true; chainN=0;
  addRing(x,y);
}

function resolve(){
  resolving=true;playing=false;cancelAnimationFrame(raf);wrap.style.transform="";
  if(popped>=goal){
    banner("过关！🎉");
    level++;
    setTimeout(startLevel,1150);
  }else{ gameOver(); }
}

function banner(txt){const b=$("banner");b.textContent=txt;b.classList.remove("show");void b.offsetWidth;b.classList.add("show");}

function gameOver(){
  $("ovTitle").textContent = popped>0 ? "差一点…只炸了 "+popped+"/"+goal : "歪了，一个没炸到 😅";
  $("ovLevel").textContent=level;
  $("ovScore").textContent=score;
  $("ovBest").textContent = score>=best ? "🎉 新纪录！" : "最高分 "+best;
  setTimeout(()=>$("overlay").classList.add("show"),350);
}

wrap.addEventListener("pointerdown",e=>{e.preventDefault();tap(e);});
$("mute").onclick=()=>{muted=!muted;$("mute").textContent=muted?"🔇":"🔊";};
best=parseInt(localStorage.getItem("chainBest2")||"0");
$("best").textContent=best;
$("startBtn").onclick=start;
$("againBtn").onclick=start;
$("restartBtn").onclick=start;
window.addEventListener("resize",()=>{if(playing)rectsize();});
</script>
</body>
</html>
